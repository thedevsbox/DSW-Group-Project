<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchitectPro – Reset Password</title>
  <link rel="stylesheet" href="resetpassword.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <div class="card-header">
        <div class="logo-row">
          <img src="assets/Logo.png" alt="ArchitectPro" class="logo" />
          <span class="brand">ArchitectPro</span>
        </div>
        <h1 class="card-title">Reset Password</h1>
        <p class="card-subtitle">Enter your new password below</p>
      </div>

      <!-- Invalid / expired link state -->
      <div id="invalidState" class="state-box error" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        <p>This reset link is invalid or has expired.</p>
        <a href="Sign.html" class="back-link">← Back to Sign In</a>
      </div>

      <!-- Reset form -->
      <form id="resetForm" novalidate>
        <div class="input-group">
          <label for="new-password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" placeholder="Minimum 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="new-password" aria-label="Toggle visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" placeholder="Re-enter your password" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="confirm-password" aria-label="Toggle visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Inline feedback -->
        <div id="resetMsg" class="reset-message" style="display:none;"></div>

        <button type="submit" id="resetBtn">Update Password</button>
      </form>

      <div class="card-footer">
        <a href="Sign.html" class="back-link">← Back to Sign In</a>
      </div>

    </div>
  </div>

  <script src="resetpassword.js"></script>
</body>
</html>
