<!DOCTYPE html>
<html lang="en" data-page-role="project">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | ArchitectPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="project.css" />
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="assets/BackgroundVideo.mp4" type="video/mp4" />
  </video>

  <div id="overlay"></div>

  <header class="navbar">
    <a href="#" class="logo">
      <img src="assets/Logo.png" alt="ArchitectPro Logo" />
      <span>ArchitectPro</span>
    </a>

    <div class="nav-right">
      <div id="menuBtn" class="icon-btn"><i data-feather="menu"></i></div>
      <div id="accountBtn" class="icon-btn"><i data-feather="user"></i></div>
    </div>
  </header>

  <div id="menuPanel" class="side-panel menu-panel">
    <div class="panel-header">
      <span>Menu</span>
      <button class="close-btn" id="closeMenu"><i data-feather="x"></i></button>
    </div>
    <nav class="menu-links">
      <a href="home.html" class="menu-link"><i data-feather="home"></i> Home</a>
      <a href="forum.html" id="forumLink" class="menu-link"><i data-feather="message-circle"></i> Forum</a>
      <a href="project.html" class="menu-link active"><i data-feather="folder"></i> Projects</a>
    </nav>
  </div>

  <div id="accountPanel" class="side-panel account-panel">
    <div class="panel-header">
      <span>Account</span>
      <button class="close-btn" id="closePanel"><i data-feather="x"></i></button>
    </div>

    <div class="account-user">
      <div class="account-avatar" id="accountAvatar"></div>
      <div>
        <h3 id="accountName">Loading...</h3>
        <p id="accountEmail">Loading...</p>
      </div>
    </div>

    <ul class="account-menu">
      <li id="personalInfoBtn"><i data-feather="user"></i> Personal Info</li>
      <li class="logout-item"><i data-feather="log-out"></i> Logout</li>
    </ul>
  </div>

  <main class="main-content">
    <section class="welcome-banner fade-in">
      <div class="welcome-user">
        <div class="welcome-avatar" id="welcomeAvatar"></div>
        <h1 id="welcomeTitle">Projects</h1>
      </div>
      <p>Track active projects, review progress, and keep the workspace organized.</p>
    </section>

        <section class="projects-section fade-in delay-2">
      <div class="section-header">
        <h2 class="section-title">Active Projects</h2>
        <button class="btn btn-ghost" id="refreshProjectsBtn">
          <i data-feather="refresh-cw"></i> Refresh
        </button>
      </div>

      <div id="projectsList" class="projects-grid"></div>
      <div id="noProjectsMsg" class="empty-state" style="display:none;">No projects found.</div>
      <div id="loadingProjects" class="loading-spinner">Loading projects...</div>
    </section>

    <section class="unity-section fade-in delay-2">
      <div class="unity-header">
        <div class="unity-title">Unity Web Build</div>
        <button class="btn btn-ghost" id="openFullUnityBtn" type="button">
          <i data-feather="external-link"></i> Open fullscreen
        </button>
      </div>

      <div class="unity-frame">
        <iframe
          id="unityFrame"
          src="/unity/ArchitectPro/index.html"
          title="ArchitectPro Unity Project"
          allow="fullscreen; clipboard-read; clipboard-write"
          allowfullscreen
        ></iframe>
      </div>
    </section>


  </main>

  <div id="personalModalOverlay" class="personal-modal-overlay">
    <div id="personalModal" class="personal-modal">
      <div class="personal-modal-header">
        <h2>Personal Info</h2>
        <button id="closePersonalModal" class="close-btn">×</button>
      </div>

      <label for="piAvatar">Profile photo</label>
      <input type="file" id="piAvatar" accept="image/*" />

      <label for="piName">Display name</label>
      <input type="text" id="piName" placeholder="Your name" />

      <label for="piEmail">Email</label>
      <input type="email" id="piEmail" placeholder="Email" />

      <label for="piPassword">New password</label>
      <input type="password" id="piPassword" placeholder="Leave empty to keep current password" />

      <div class="personal-actions">
        <button class="btn btn-ghost" id="piLogout">Logout</button>
        <button class="btn btn-primary" id="piSave">Save changes</button>
      </div>
    </div>
  </div>

  <script src="project.js"></script>
</body>
</html>
